name: wasm-deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://silentnoisehun.github.io/microscope-memory/
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -r web-demo/* _site/ 2>/dev/null || true
          echo "Microscope Memory WASM Demo Loaded" > _site/health.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
