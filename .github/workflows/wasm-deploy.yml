name: wasm-deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.100

      - name: Build WASM binary
        run: |
          cargo build --target wasm32-unknown-unknown --release --features wasm 2>&1
          echo "=== find wasm ==="
          find target/ -name "*.wasm" 2>/dev/null || echo "no .wasm files"
        continue-on-error: true

      - name: Generate JS bindings
        run: |
          WASM=$(find target/ -name "*.wasm" 2>/dev/null | head -1)
          if [ -n "$WASM" ]; then
            echo "Found WASM: $WASM"
            mkdir -p web-demo/pkg
            wasm-bindgen "$WASM" --target web --out-dir web-demo/pkg
            ls -la web-demo/pkg/
          else
            echo "No WASM file found - cargo build may have failed"
          fi
        continue-on-error: true

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -r web-demo/* _site/ 2>/dev/null || true
          echo "=== _site/ ==="
          find _site -type f | sort
          echo "Microscope Memory WASM Demo Loaded" > _site/health.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://silentnoisehun.github.io/microscope-memory/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
