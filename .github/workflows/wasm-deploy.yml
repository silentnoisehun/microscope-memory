name: wasm-deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Check Rust compilation (wasm target)
        run: |
          cargo check --target wasm32-unknown-unknown --features wasm 2>&1 || echo "cargo check failed"
        continue-on-error: true

      - name: Build WASM with wasm-pack
        run: |
          wasm-pack build --target web --out-dir web-demo/pkg -- --features wasm 2>&1 || \
            (echo "WASM_BUILD_FAILED=true" >> $GITHUB_ENV && echo "wasm-pack build failed - will use JS fallback")
        continue-on-error: true

      - name: List pkg contents
        run: |
          echo "=== pkg/ ==="
          ls -la web-demo/pkg/ 2>/dev/null || echo "pkg/ not found"
          echo "=== web-demo/ ==="
          ls -la web-demo/ 2>/dev/null

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -r web-demo/* _site/ 2>/dev/null || true
          echo "=== _site/ ==="
          find _site -type f | sort
          if [ -f _site/index.html ]; then
            echo "index.html present"
          else
            echo "index.html MISSING"
            exit 1
          fi
          echo "Microscope Memory WASM Demo Loaded" > _site/health.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://silentnoisehun.github.io/microscope-memory/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
