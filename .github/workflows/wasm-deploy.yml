name: wasm-deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'web-demo/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Build WASM
        run: wasm-pack build --target web --out-dir web-demo/pkg -- --features wasm

      - name: Copy web-demo to deploy
        run: |
          mkdir -p _site
          cp -r web-demo/* _site/
          cp web-demo/index.html _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: \${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
