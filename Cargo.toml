[package]
name = "microscope-memory"
version = "0.1.0"
edition = "2021"
authors = ["Máté Róbert (Silent) <your.email@example.com>"]
description = "Zoom-based hierarchical memory — CPU analogy: same block size, different depth. Vector L2 + mmap, sub-microsecond queries."
readme = "README.md"
homepage = "https://github.com/yourusername/microscope-memory"
repository = "https://github.com/yourusername/microscope-memory"
license = "MIT"
keywords = ["memory", "indexing", "mmap", "vector-search", "hierarchical"]
categories = ["data-structures", "algorithms", "memory-management"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4", features = ["derive"] }
colored = "2"
memmap2 = "0.9"
rayon = "1.8"
toml = "0.8"

# WASM dependencies
wasm-bindgen = { version = "0.2", optional = true }
web-sys = { version = "0.3", features = ["console"], optional = true }
console_error_panic_hook = { version = "0.1", optional = true }

# Python bindings
pyo3 = { version = "0.20", features = ["extension-module"], optional = true }

# GPU acceleration
wgpu = { version = "0.19", optional = true }

# For future real embeddings integration
# openai-api-rust = { version = "0.1", optional = true }
# candle-core = { version = "0.3", optional = true }
# candle-transformers = { version = "0.3", optional = true }

[features]
default = []
wasm = ["wasm-bindgen", "web-sys", "console_error_panic_hook"]
python = ["pyo3"]
gpu = ["wgpu"]
openai = []  # Enable OpenAI embeddings
huggingface = []  # Enable HuggingFace embeddings
simd = []  # Force SIMD optimizations

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1
