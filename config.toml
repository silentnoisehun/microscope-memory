# Microscope Memory Configuration
[paths]
layers_dir = "D:/Claude Memory/layers"
output_dir = "D:/Claude Memory/microscope"
temp_dir = "tmp/microscope"

[index]
block_size = 256
max_depth = 8
header_size = 32

[search]
default_k = 10
zoom_weight = 2.0
keyword_boost = 0.1

[memory_layers]
layers = [
    "long_term",
    "short_term",
    "associative",
    "emotional",
    "relational",
    "reflections",
    "crypto_chain",
    "echo_cache",
    "rust_state"
]

[performance]
use_mmap = true
cache_size = 64
build_workers = 8

[logging]
level = "info"
file = "microscope.log"
