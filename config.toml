# Microscope Memory Configuration
[paths]
layers_dir = "layers"
output_dir = "output"
temp_dir = "tmp"

[index]
block_size = 256
max_depth = 8
header_size = 32

[search]
default_k = 10
zoom_weight = 2.0
keyword_boost = 0.1
semantic_weight = 0.0

[memory_layers]
layers = [
    "long_term",
    "short_term",
    "associative",
    "emotional",
    "relational",
    "reflections",
]

[performance]
use_mmap = true
cache_size = 64
build_workers = 4

[logging]
level = "info"
file = "microscope.log"
