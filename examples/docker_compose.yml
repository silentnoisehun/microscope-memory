version: "3.9"
services:
  microscope:
    build: .
    ports:
      - "6060:6060"
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./layers:/app/layers
    command: ["/app/target/release/microscope-mem", "bridge", "--host", "0.0.0.0", "--port", "6060"]
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
