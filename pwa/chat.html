<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <title>Microscope Memory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="status offline" id="status-dot"></div>
    <div>
      <h1>Microscope <span>✦</span></h1>
      <div class="subtitle"><span id="status-text">kapcsolodas...</span> &middot; privát &middot; lokális</div>
    </div>
  </header>

  <div id="chat-area"></div>

  <div id="import-section">
    <label>ChatGPT export importálása:</label>
    <input type="file" id="import-json" accept=".json">
    <button id="import-btn">Importálás</button>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Írj valamit..." rows="1"></textarea>
    <button id="send-btn">Küldés</button>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
