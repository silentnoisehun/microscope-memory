name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: microscope-mem
            asset_name: microscope-mem-linux-x64
          - os: windows-latest
            artifact_name: microscope-mem.exe
            asset_name: microscope-mem-windows-x64.exe
          - os: macos-latest
            artifact_name: microscope-mem
            asset_name: microscope-mem-macos-arm64

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build release
        run: cargo build --release
        
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.artifact_name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            microscope-mem-linux-x64/microscope-mem
            microscope-mem-windows-x64.exe/microscope-mem.exe
            microscope-mem-macos-arm64/microscope-mem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
